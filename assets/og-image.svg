<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="85%" r="55%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- grid dots -->
  <g fill="#1e1e2e">
    <g id="dots">
      <circle cx="0" cy="0" r="1.5"/>
    </g>
  </g>

  <!-- brand mark -->
  <g transform="translate(80,80)">
    <rect width="72" height="72" rx="16" fill="#12121a" stroke="#24243a"/>
    <g transform="translate(12,12)" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="16,12 6,24 16,36"/>
      <polyline points="32,12 42,24 32,36"/>
      <line x1="28" y1="8" x2="20" y2="40"/>
    </g>
  </g>
  <text x="170" y="130" font-family="'JetBrains Mono', monospace" font-size="26" fill="#e6e7ee" font-weight="700">Valeriy-Dev<tspan fill="#00e5ff">_</tspan>Automation</text>

  <!-- headline -->
  <text x="80" y="330" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="700" fill="#e6e7ee" letter-spacing="-2">Next-Generation</text>
  <text x="80" y="410" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="700" fill="url(#accent)" letter-spacing="-2">Automation &amp; AI Workflows</text>

  <!-- subheading -->
  <text x="80" y="470" font-family="Inter, system-ui, sans-serif" font-size="26" fill="#9aa0b4">Python agents · Telegram bots · LLM integrations · AWS</text>

  <!-- tag chips -->
  <g font-family="'JetBrains Mono', monospace" font-size="18" fill="#e6e7ee">
    <g transform="translate(80,520)">
      <rect width="120" height="44" rx="10" fill="#12121a" stroke="#24243a"/>
      <text x="60" y="28" text-anchor="middle">Python</text>
    </g>
    <g transform="translate(212,520)">
      <rect width="140" height="44" rx="10" fill="#12121a" stroke="#24243a"/>
      <text x="70" y="28" text-anchor="middle">Claude</text>
    </g>
    <g transform="translate(364,520)">
      <rect width="180" height="44" rx="10" fill="#12121a" stroke="#24243a"/>
      <text x="90" y="28" text-anchor="middle">AWS Bedrock</text>
    </g>
    <g transform="translate(556,520)">
      <rect width="160" height="44" rx="10" fill="#12121a" stroke="#24243a"/>
      <text x="80" y="28" text-anchor="middle">Telegram</text>
    </g>
  </g>

  <!-- URL -->
  <text x="1120" y="590" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="18" fill="#6b7085">valeriy-dev.xyz</text>
</svg>
