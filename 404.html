<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>404 — Valeriy-Dev Automation</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <style>
    .nf {
      min-height: 100vh;
      display: grid; place-items: center;
      padding: 40px 24px;
      text-align: center;
    }
    .nf-code {
      font-family: var(--font-mono);
      font-size: clamp(5rem, 18vw, 10rem);
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text; background-clip: text;
      color: transparent;
      letter-spacing: -0.04em;
    }
    .nf h1 { font-size: clamp(1.4rem, 3vw, 2rem); margin-top: 12px; }
    .nf p { color: var(--text-dim); max-width: 460px; margin: 10px auto 28px; }
    .nf-path {
      font-family: var(--font-mono);
      background: var(--bg-elev);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 8px;
      color: var(--accent);
      font-size: 13px;
      display: inline-block;
      margin-bottom: 28px;
    }
  </style>
</head>
<body>
  <main class="nf">
    <div>
      <p class="nf-code">404</p>
      <h1>This route does not exist.</h1>
      <p>The page you are looking for has been moved, renamed, or never existed.</p>
      <p class="nf-path" id="nf-path">/</p>
      <a href="/" class="btn btn-primary">← Back to home</a>
    </div>
  </main>
  <script>
    document.getElementById('nf-path').textContent = location.pathname + location.search;
  </script>
</body>
</html>
