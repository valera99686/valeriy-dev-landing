name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare static bundle
        run: |
          mkdir -p _site
          rsync -a --exclude='.git' --exclude='.github' --exclude='backend' \
                --exclude='infra' --exclude='tests' --exclude='node_modules' \
                --exclude='playwright*' --exclude='package*.json' \
                --exclude='.lighthouserc.json' --exclude='.lighthouseci' \
                --exclude='CONTRIBUTING.md' --exclude='_site' \
                ./ _site/
          echo "Files to deploy:" && find _site -maxdepth 3 -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
